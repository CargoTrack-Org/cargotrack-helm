---
# ── AI Service ServiceAccount — IRSA annotated ───────────────────────────────
# IRSA grants: SQS consume, Bedrock invoke (Nova Lite + Pro), Textract,
#              S3 read, DynamoDB write (audit trail), KMS decrypt
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
  labels:
    app: ai-service
    {{- include "ai-service.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
# ── AI Service Deployment ─────────────────────────────────────────────────────
# Responsibilities:
#   - SQS compliance queue consumer (background polling loop — always running)
#   - Compliance analysis via Amazon Bedrock (Nova Lite / Pro)
#   - Shipment Intelligence Copilot (7 capabilities)
#   - Route Intelligence Briefing
#   - AWS Textract document extraction
#   - DynamoDB audit trail write
#   - Knowledge Base: 5 JSON catalogs embedded in image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ai-service
    {{- include "ai-service.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/change-cause: "Helm release {{ .Release.Revision }}"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime; SQS polling must never have a gap
  template:
    metadata:
      labels:
        app: ai-service
      # ── OTEL auto-instrumentation ─────────────────────────────────────────────────
      # The CloudWatch Observability add-on auto-injects init containers for ALL
      # four language agents (java, nodejs, python, dotnet) via its mutating
      # admission webhook. ai-service is Node.js only — opt out of the other three.
      # inject-nodejs is set to "false" here to prevent OTel log flooding from
      # the Node.js agent (causes excessive CloudWatch Logs ingest charges).
      # Tracing is handled via the CargoTrack application-level instrumentation.
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "false"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      # 60s grace: allow in-flight Bedrock calls and SQS message processing to complete
      terminationGracePeriodSeconds: 60

      # ── Spread pods across availability zones ─────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ai-service

      # ── Pod-level security context ─────────────────────────────────────────
      securityContext:
        fsGroup: 1000

      containers:
        - name: ai-service
          image: {{ .Values.image.registry }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP

          # ── Non-sensitive config (AWS resource identifiers) ───────────────
          envFrom:
            - configMapRef:
                name: cargotrack-aws-config

          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.port | quote }}
            - name: MOCK_AGENT
              value: {{ .Values.env.MOCK_AGENT | quote }}
            - name: TEXTRACT_ENABLED
              value: {{ .Values.env.TEXTRACT_ENABLED | default "false" | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.env.LLM_PROVIDER | default "bedrock" | quote }}
            {{- if .Values.env.BEDROCK_MODEL_ID }}
            - name: BEDROCK_MODEL_ID
              value: {{ .Values.env.BEDROCK_MODEL_ID | quote }}
            {{- end }}

            # DB credentials (ai-service reads shipment data for analysis)
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: DATABASE_PASSWORD

          # ── Resource management ───────────────────────────────────────────
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Container-level security context ──────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
