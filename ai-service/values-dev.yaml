# AI Service — Dev Environment Overrides
global:
  environment: dev
  namespace: cargotrack-dev
image:
  registry: "692828329130.dkr.ecr.us-east-1.amazonaws.com"
  tag: "18cee0eff3b3bdf86e098a7e3de5c79a2bd91e33" # CI/CD overwrites on every push
  pullPolicy: Always
serviceAccount:
  roleArn: "arn:aws:iam::692828329130:role/cargotrack-irsa-ai-service"
env:
  NODE_ENV: production
  MOCK_AGENT: "false"
  TEXTRACT_ENABLED: "true"
  LLM_PROVIDER: "bedrock"
  BEDROCK_MODEL_ID: "amazon.nova-lite-v1:0"
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTargetPercent: 70
  scaleInStabilizationSeconds: 600
