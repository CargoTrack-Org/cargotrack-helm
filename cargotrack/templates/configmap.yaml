# cargotrack-aws-config ConfigMap is intentionally NOT created by this Helm chart.
#
# WHY:
#   This ConfigMap contains Terraform-managed infrastructure values (RDS endpoint,
#   S3 bucket name, EventBridge bus name, SQS queue URLs, DynamoDB table name,
#   Secrets Manager ARNs). These values are Terraform outputs — they are unknown
#   at git-commit time and cannot be statically embedded in a values file.
#
#   If this template rendered the ConfigMap from values-dev.yaml, all values would
#   be empty strings ("") — causing the core-service init container to fail with:
#     nc: bad address ''
#
# OWNER:
#   kubernetes_config_map.cargotrack_aws_config in:
#   cargotrack-infra/environments/dev/k8s.tf
#
#   Terraform creates this ConfigMap using direct module output references:
#     DATABASE_HOST  ← module.database.db_endpoint  (RDS address, port stripped)
#     S3_BUCKET      ← module.storage.bucket_id
#     EVENT_BUS_NAME ← module.eventing.event_bus_name
#     ... etc.
#
#   The ConfigMap exists before ArgoCD syncs any Deployments, so all pods that
#   reference it via envFrom.configMapRef will find it immediately.
#
# DO NOT add a ConfigMap resource back to this file without removing the
# Terraform-managed resource first — duplicate ownership will cause conflicts.
