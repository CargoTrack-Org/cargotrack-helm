---
# ── Core Service ServiceAccount — IRSA annotated ─────────────────────────────
# IRSA grants: S3, EventBridge, SQS, Secrets Manager, KMS
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.coreService.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.coreService.serviceAccount.roleArn | quote }}
  labels:
    app: core-service
    {{- include "cargotrack.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
# ── Core Service Deployment ───────────────────────────────────────────────────
# Responsibilities:
#   - Auth (JWT issue), Shipments CRUD, Admin, Reports, Notifications
#   - Copilot proxy to ai-service
#   - Prisma migrations on startup (only service that runs migrations)
#   - EventBridge publisher, SQS compliance trigger
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: core-service
    {{- include "cargotrack.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/change-cause: "Helm release {{ .Release.Revision }}"
spec:
  replicas: {{ .Values.coreService.replicas }}
  selector:
    matchLabels:
      app: core-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime: always keep full replica count running
  template:
    metadata:
      labels:
        app: core-service
      # ── OTEL auto-instrumentation: keep only Node.js agent ─────────────────────────
      # CloudWatch Observability injects all 4 agents (java/nodejs/python/dotnet)
      # by default. core-service is Node.js only — opt out of the other three.
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      serviceAccountName: {{ .Values.coreService.serviceAccount.name }}
      terminationGracePeriodSeconds: 60   # allow in-flight requests to drain

      # ── Spread pods across availability zones ─────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: core-service

      # ── Pod-level security context ─────────────────────────────────────────
      securityContext:
        fsGroup: 1000

      # ── Init container: wait for RDS to accept connections ─────────────────
      # Prevents Prisma migrate from failing during RDS cold-start.
      # DATABASE_HOST and DATABASE_PORT come from the cargotrack-aws-config ConfigMap.
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "[init] Waiting for database at ${DATABASE_HOST}:${DATABASE_PORT}..."
              until nc -z "$DATABASE_HOST" "$DATABASE_PORT"; do
                echo "[init] DB not ready — retrying in 3s"
                sleep 3
              done
              echo "[init] Database is reachable — starting core-service"
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: cargotrack-aws-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: cargotrack-aws-config
                  key: DATABASE_PORT
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000

      containers:
        - name: core-service
          image: {{ .Values.image.registry }}/{{ .Values.coreService.image }}:{{ .Values.coreService.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.coreService.port }}
              protocol: TCP

          # ── Environment variables ─────────────────────────────────────────
          # Non-sensitive config from ConfigMap (AWS resource identifiers)
          envFrom:
            - configMapRef:
                name: cargotrack-aws-config

          env:
            - name: NODE_ENV
              value: {{ .Values.coreService.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.coreService.port | quote }}

            # Internal service URL for copilot proxy
            - name: AI_SERVICE_URL
              value: "http://ai-service:{{ .Values.aiService.port }}"

            # Sensitive credentials from Kubernetes Secret
            # (created by scripts/post-apply-setup.sh from AWS Secrets Manager)
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: JWT_SECRET
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: ADMIN_PASSWORD

          # ── Resource management ───────────────────────────────────────────
          resources:
            {{- toYaml .Values.coreService.resources | nindent 12 }}

          # ── Readiness probe ───────────────────────────────────────────────
          # Delayed to allow Prisma migrations to complete before traffic arrives
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Container-level security context ──────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
---
# ── Core Service — ClusterIP Service ─────────────────────────────────────────
# Internal only. Accessed by frontend nginx proxy (/api/*).
apiVersion: v1
kind: Service
metadata:
  name: core-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: core-service
spec:
  type: ClusterIP
  selector:
    app: core-service
  ports:
    - name: http
      port: {{ .Values.coreService.port }}
      targetPort: http
      protocol: TCP
