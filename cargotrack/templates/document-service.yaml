---
# ── Document Service ServiceAccount — IRSA annotated ─────────────────────────
# IRSA grants: S3 read/write, Textract, KMS decrypt
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.documentService.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.documentService.serviceAccount.roleArn | quote }}
  labels:
    app: document-service
    {{- include "cargotrack.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
# ── Document Service Deployment ───────────────────────────────────────────────
# Responsibilities:
#   - Upload documents to S3
#   - Download / list documents from S3
#   - Optional Textract document analysis (TEXTRACT_ENABLED=true)
#   - JWT token verification (token issued by core-service)
# NO Prisma migrations — core-service owns the schema
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: document-service
    {{- include "cargotrack.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/change-cause: "Helm release {{ .Release.Revision }}"
spec:
  replicas: {{ .Values.documentService.replicas }}
  selector:
    matchLabels:
      app: document-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: document-service
      # ── OTEL auto-instrumentation: keep only Node.js agent ─────────────────────────
      # CloudWatch Observability injects all 4 agents by default.
      # document-service is Node.js only — opt out of java/python/dotnet.
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      serviceAccountName: {{ .Values.documentService.serviceAccount.name }}
      terminationGracePeriodSeconds: 30   # allow in-flight S3/Textract calls to finish

      # ── Spread pods across availability zones ─────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: document-service

      # ── Pod-level security context ─────────────────────────────────────────
      # fsGroup: 1000 — kubelet sets group ownership on mounted volumes to 1000
      # (matching runAsUser: 1000 below), making them writable without root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── Volumes ───────────────────────────────────────────────────────────────
      # /uploads — ephemeral scratch space for document-service.
      #
      # The document-service Node.js app calls mkdir('/uploads') at startup.
      # Mounting an emptyDir here means:
      #   1. The directory EXISTS before the container starts (kubelet creates it)
      #   2. The container does NOT need to create it → no EACCES error
      #   3. The directory is writable because fsGroup: 1000 sets group ownership
      #
      # emptyDir is correct here because document-service uploads are forwarded
      # to S3 (module.storage.bucket_id). The /uploads path is only a temporary
      # staging area — persistence across pod restarts is not required.
      # If durable local storage becomes necessary, replace with a PVC.
      volumes:
        - name: uploads-scratch
          emptyDir: {}

      containers:
        - name: document-service
          image: {{ .Values.image.registry }}/{{ .Values.documentService.image }}:{{ .Values.documentService.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.documentService.port }}
              protocol: TCP

          # ── Non-sensitive config (AWS resource identifiers) ───────────────
          envFrom:
            - configMapRef:
                name: cargotrack-aws-config

          env:
            - name: NODE_ENV
              value: {{ .Values.documentService.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.documentService.port | quote }}

            # DB credentials (document-service reads shipment data for associations)
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: DATABASE_PASSWORD

            # JWT secret to verify tokens issued by core-service
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: JWT_SECRET

          # ── Resource management ───────────────────────────────────────────
          resources:
            {{- toYaml .Values.documentService.resources | nindent 12 }}

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── /uploads volume mount ─────────────────────────────────────────
          # Mount the emptyDir at the path the app tries to mkdir at startup.
          # The kubelet creates the directory with group 1000 (fsGroup) before
          # the container starts — no EACCES: permission denied.
          volumeMounts:
            - name: uploads-scratch
              mountPath: /uploads

          # ── Container-level security context ──────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
---
# ── Document Service — ClusterIP Service ─────────────────────────────────────
# Internal only. Accessed by frontend nginx proxy (/api/documents/*) via
# ALB path-based routing direct to this service.
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: document-service
spec:
  type: ClusterIP
  selector:
    app: document-service
  ports:
    - name: http
      port: {{ .Values.documentService.port }}
      targetPort: http
      protocol: TCP
