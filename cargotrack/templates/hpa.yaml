      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
# ── AI Service HPA ────────────────────────────────────────────────────────────
# Scale-in is more conservative than other services to preserve SQS polling
# state continuity. scaleInStabilizationSeconds is configurable via values.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ai-service
    {{- include "cargotrack.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: {{ .Values.hpa.aiService.minReplicas }}
  maxReplicas: {{ .Values.hpa.aiService.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.aiService.cpuTargetPercent }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 90
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.hpa.aiService.scaleInStabilizationSeconds | default 600 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
---
# ── Document Service HPA ──────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-service-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app: document-service
    {{- include "cargotrack.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-service
  minReplicas: {{ .Values.hpa.documentService.minReplicas }}
  maxReplicas: {{ .Values.hpa.documentService.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.documentService.cpuTargetPercent }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
{{- end }}
