{{- if .Values.ingress.enabled }}
---
# ── CargoTrack Ingress — AWS ALB ──────────────────────────────────────────────
# Controller: AWS Load Balancer Controller (NOT NGINX, NOT KGateway)
#
# Path-based ALB routing (direct to services — bypasses nginx for API calls):
#   /api/documents/* → document-service:4001  (must be first — Prefix match order)
#   /api/*           → core-service:4000
#   /                → frontend:80            (catch-all: React SPA + nginx)
#
# Traffic flow:
#   Internet → CloudFront → ALB (internet-facing) → services
#
# ALB DNS appears under: kubectl get ingress -n cargotrack
# Wire CloudFront origin to ALB DNS after first apply.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cargotrack
  namespace: {{ .Values.global.namespace }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
  labels:
    app: cargotrack
    {{- include "cargotrack.labels" . | nindent 4 }}
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Document service — must be listed BEFORE /api to take priority
          - path: /api/documents
            pathType: Prefix
            backend:
              service:
                name: document-service
                port:
                  number: {{ .Values.documentService.port }}

          # Core service — all other /api/* routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core-service
                port:
                  number: {{ .Values.coreService.port }}

          # Frontend — catch-all (React SPA + nginx healthcheck)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
