# CargoTrack Dev Environment — Image + AWS resource overrides
# ─────────────────────────────────────────────────────────────────────────────
# ECR registry and image tags are set here permanently.
# The GitHub Actions workflow (build-push.yml) overwrites .image.registry and
# *.tag on every push — this file holds the last-known-good values.
# ─────────────────────────────────────────────────────────────────────────────

global:
  environment: dev
  region: us-east-1
  namespace: cargotrack
image:
  # ECR registry: <account_id>.dkr.ecr.<region>.amazonaws.com
  registry: "692828329130.dkr.ecr.us-east-1.amazonaws.com"
  pullPolicy: Always
# ── Image tags — all services use the latest pushed tag ──────────────────────
# GitHub Actions overwrites these with the git SHA on every push.
coreService:
  tag: "92087c9b0d5767416fb1ad91325c1f5c2d54157b"
  serviceAccount:
    roleArn: "arn:aws:iam::692828329130:role/cargotrack-irsa-core-service"
documentService:
  tag: "92087c9b0d5767416fb1ad91325c1f5c2d54157b"
  serviceAccount:
    roleArn: "arn:aws:iam::692828329130:role/cargotrack-irsa-document-service"
aiService:
  tag: "92087c9b0d5767416fb1ad91325c1f5c2d54157b"
  serviceAccount:
    roleArn: "arn:aws:iam::692828329130:role/cargotrack-irsa-ai-service"
  env:
    # ── FIXED: Real Bedrock + Textract enabled ─────────────────────────────
    MOCK_AGENT: "false"
    TEXTRACT_ENABLED: "true"
    LLM_PROVIDER: "bedrock"
    BEDROCK_MODEL_ID: "amazon.nova-lite-v1:0"
frontend:
  tag: "92087c9b0d5767416fb1ad91325c1f5c2d54157b"
# ── HPA — dev: enabled with default CPU targets ───────────────────────────────
hpa:
  enabled: true
# ── AWS resource connections ───────────────────────────────────────────────────
aws:
  region: us-east-1
  rdsEndpoint: "" # terraform output -raw rds_endpoint (sensitive — injected at deploy time)
  rdsDatabase: cargotrack
  rdsUsername: cargotrack
  s3BucketName: "cargotrack-documents"
  eventBusName: "cargotrack-events"
  complianceQueueUrl: "https://sqs.us-east-1.amazonaws.com/692828329130/cargotrack-compliance-trigger"
  auditTableName: "cargotrack-audit"
  dbSecretArn: "arn:aws:secretsmanager:us-east-1:692828329130:secret:cargotrack-database-secret-v2-qobXcc"
  appSecretArn: "arn:aws:secretsmanager:us-east-1:692828329130:secret:cargotrack-application-secret-v2-xkPkv9"
