# CargoTrack Production Helm Overrides
# ─────────────────────────────────────────────────────────────────────────────
# Apply with:
#   helm upgrade --install cargotrack ./helm/cargotrack \
#     -f values.yaml -f values-prod.yaml
#
# Production hardening vs dev:
#   - Higher replica counts (3 per service)
#   - Higher resource limits
#   - MOCK_AGENT=false  → real Amazon Bedrock Nova Pro
#   - TEXTRACT_ENABLED=true → real AWS Textract
#   - HPA ai-service minReplicas: 1 (singleton SQS consumer)
#   - HTTPS listener + ACM certificate
#   - IfNotPresent pull policy (faster restarts from cached layer)
# ─────────────────────────────────────────────────────────────────────────────

global:
  environment: prod
  region: us-east-1
  namespace: cargotrack-prod

image:
  # ECR registry — same account, no change needed; post-apply-setup populates this
  registry: ""           # INJECT: same as dev (same AWS account)
  pullPolicy: IfNotPresent   # Use cached layer in prod for faster pod restarts

# ── Core Service ──────────────────────────────────────────────────────────────
coreService:
  tag: latest            # CI/CD replaces with git SHA on every push
  replicas: 3
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  serviceAccount:
    roleArn: ""          # INJECT: terraform output irsa_core_service_role_arn
  env:
    NODE_ENV: production
    PORT: "4000"

# ── Document Service ──────────────────────────────────────────────────────────
documentService:
  tag: latest
  replicas: 3
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  serviceAccount:
    roleArn: ""          # INJECT: terraform output irsa_document_service_role_arn
  env:
    NODE_ENV: production
    PORT: "4001"

# ── AI Service ────────────────────────────────────────────────────────────────
# minReplicas: 1 — production uses a single SQS consumer to avoid duplicate
# compliance analysis. The HPA can scale up under CPU load (Bedrock calls
# are CPU-bound on the node side). Scale-in is very conservative (10-min window).
aiService:
  tag: latest
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  serviceAccount:
    roleArn: ""          # INJECT: terraform output irsa_ai_service_role_arn
  env:
    NODE_ENV: production
    PORT: "4002"
    MOCK_AGENT: "false"              # Real Amazon Bedrock Nova Pro
    TEXTRACT_ENABLED: "true"         # Real AWS Textract
    BEDROCK_MODEL_ID: "amazon.nova-pro-v1:0"

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  tag: latest
  replicas: 3
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Ingress — Production ALB with HTTPS ───────────────────────────────────────
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    alb.ingress.kubernetes.io/group.name: cargotrack-prod
    alb.ingress.kubernetes.io/certificate-arn: ""     # INJECT: ACM cert ARN
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

# ── HPA — Production overrides ────────────────────────────────────────────────
hpa:
  enabled: true
  coreService:
    minReplicas: 3
    maxReplicas: 20
    cpuTargetPercent: 70
  documentService:
    minReplicas: 3
    maxReplicas: 20
    cpuTargetPercent: 70
  aiService:
    minReplicas: 1        # Singleton consumer; HPA can scale up under CPU pressure
    maxReplicas: 5
    cpuTargetPercent: 70
    scaleInStabilizationSeconds: 600
  frontend:
    minReplicas: 3
    maxReplicas: 20
    cpuTargetPercent: 70

# ── AWS Resources ─────────────────────────────────────────────────────────────
# Populated by post-apply-setup.sh after terraform apply
aws:
  region: us-east-1
  rdsEndpoint: ""
  rdsDatabase: cargotrack
  rdsUsername: cargotrack
  s3BucketName: ""
  eventBusName: ""
  complianceQueueUrl: ""
  auditTableName: ""
  dbSecretArn: ""
  appSecretArn: ""
