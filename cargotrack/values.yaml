# CargoTrack v3 Helm Chart — Default Values
# Override in values-dev.yaml or values-prod.yaml

# ── Global settings ───────────────────────────────────────────────────────────
global:
  environment: dev
  region: us-east-1
  namespace: cargotrack

# ── Image registry ────────────────────────────────────────────────────────────
# ECR registry URL format: <account_id>.dkr.ecr.<region>.amazonaws.com
# Injected by scripts/post-apply-setup.sh from: terraform output ecr_registry_id
# Override in values-dev.yaml / values-prod.yaml
image:
  registry: ""          # INJECT: <account>.dkr.ecr.us-east-1.amazonaws.com
  pullPolicy: Always

# ── Core Service ──────────────────────────────────────────────────────────────
coreService:
  image: cargotrack-core
  tag: v1
  replicas: 2
  port: 4000
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  serviceAccount:
    name: core-service
    roleArn: ""       # INJECT: terraform output irsa_core_service_role_arn
  env:
    NODE_ENV: production
    PORT: "4000"

# ── Document Service ──────────────────────────────────────────────────────────
documentService:
  image: cargotrack-docs
  tag: v1
  replicas: 2
  port: 4001
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  serviceAccount:
    name: document-service
    roleArn: ""       # INJECT: terraform output irsa_document_service_role_arn
  env:
    NODE_ENV: production
    PORT: "4001"

# ── AI Service ────────────────────────────────────────────────────────────────
# replicas: 2 — SQS handles duplicate delivery via visibility timeout.
# Use minReplicas: 1 in values-prod.yaml if strict singleton is required.
aiService:
  image: cargotrack-ai
  tag: v1
  replicas: 2
  port: 4002
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  serviceAccount:
    name: ai-service
    roleArn: ""       # INJECT: terraform output irsa_ai_service_role_arn
  env:
    NODE_ENV: production
    PORT: "4002"
    MOCK_AGENT: "true"          # Override to "false" when Bedrock is available
    TEXTRACT_ENABLED: "false"   # Override to "true" with real Textract access

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image: cargotrack-frontend
  tag: v1
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ── Ingress (AWS Load Balancer Controller) ────────────────────────────────────
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/group.name: cargotrack
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

# ── Horizontal Pod Autoscaling ────────────────────────────────────────────────
# Requires metrics-server installed on the cluster.
# Install: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
hpa:
  enabled: true
  coreService:
    minReplicas: 2
    maxReplicas: 10
    cpuTargetPercent: 70
  documentService:
    minReplicas: 2
    maxReplicas: 10
    cpuTargetPercent: 70
  aiService:
    # minReplicas: 2 by default. Set to 1 in values-prod.yaml if strict
    # singleton SQS consumption is required for your use case.
    minReplicas: 2
    maxReplicas: 10
    cpuTargetPercent: 70
    scaleInStabilizationSeconds: 600   # 10-min cooldown — preserves SQS polling continuity
  frontend:
    minReplicas: 2
    maxReplicas: 10
    cpuTargetPercent: 70

# ── AWS resource connections ──────────────────────────────────────────────────
# Injected by scripts/post-apply-setup.sh from terraform output
aws:
  region: us-east-1
  rdsEndpoint: ""
  rdsDatabase: cargotrack
  rdsUsername: cargotrack
  s3BucketName: ""
  eventBusName: ""
  complianceQueueUrl: ""
  auditTableName: ""
  dbSecretArn: ""
  appSecretArn: ""
