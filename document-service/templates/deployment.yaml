---
# ── Document Service ServiceAccount — IRSA annotated ─────────────────────────
# IRSA grants: S3 read/write, Textract, KMS decrypt
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
  labels:
    app: document-service
    {{- include "document-service.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
# ── Document Service Deployment ───────────────────────────────────────────────
# Responsibilities:
#   - Upload documents to S3
#   - Download / list documents from S3
#   - Optional Textract document analysis (TEXTRACT_ENABLED=true)
#   - JWT token verification (token issued by core-service)
# NO Prisma migrations — core-service owns the schema
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: document-service
    {{- include "document-service.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/change-cause: "Helm release {{ .Release.Revision }}"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: document-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: document-service
      # ── OTEL auto-instrumentation: keep only Node.js agent ─────────────────────────
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: 30   # allow in-flight S3/Textract calls to finish

      # ── Spread pods across availability zones ─────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: document-service

      # ── Pod-level security context ─────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── Volumes ───────────────────────────────────────────────────────────────
      # /uploads — ephemeral scratch space for document-service.
      # emptyDir is correct: uploads are forwarded to S3; local path is temporary staging only.
      volumes:
        - name: uploads-scratch
          emptyDir: {}

      containers:
        - name: document-service
          image: {{ .Values.image.registry }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP

          # ── Non-sensitive config (AWS resource identifiers) ───────────────
          envFrom:
            - configMapRef:
                name: cargotrack-aws-config

          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.port | quote }}

            # DB credentials (document-service reads shipment data for associations)
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: DATABASE_PASSWORD

            # JWT secret to verify tokens issued by core-service
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: JWT_SECRET

          # ── Resource management ───────────────────────────────────────────
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── /uploads volume mount ─────────────────────────────────────────
          volumeMounts:
            - name: uploads-scratch
              mountPath: /uploads

          # ── Container-level security context ──────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
