# Document Service — Prod Environment Overrides
global:
  environment: prod
  namespace: cargotrack-prod
image:
  registry: "692828329130.dkr.ecr.us-east-1.amazonaws.com"
  tag: "a272bd3e9ad0adf6664a00b591b98fa7750237aa" # CI/CD overwrites on every push
  pullPolicy: Always
replicas: 2
serviceAccount:
  # Prod and dev share the same IRSA roles in this single-cluster evaluation setup.
  roleArn: "arn:aws:iam::692828329130:role/cargotrack-irsa-document-service"
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTargetPercent: 70
