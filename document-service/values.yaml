# CargoTrack — Document Service Chart Default Values
# Override per-environment in values-dev.yaml / values-prod.yaml

global:
  environment: dev
  namespace: cargotrack-dev
  region: us-east-1

image:
  registry: ""          # INJECT: <account>.dkr.ecr.us-east-1.amazonaws.com
  name: cargotrack-docs
  tag: v1
  pullPolicy: Always

replicas: 2
port: 4001

serviceAccount:
  name: document-service
  roleArn: ""           # INJECT: arn:aws:iam::<account>:role/cargotrack-irsa-document-service

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  NODE_ENV: production

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTargetPercent: 70
