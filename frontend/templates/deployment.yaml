---
# ── Frontend ServiceAccount ───────────────────────────────────────────────────
# No IRSA: nginx is stateless and makes no direct AWS API calls.
# AWS calls are proxied through core-service and document-service (which have IRSA).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
    {{- include "frontend.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
# ── Frontend Deployment ───────────────────────────────────────────────────────
# nginx reverse proxy + React SPA static file server.
# At startup, entrypoint.sh runs envsubst to inject:
#   CORE_SERVICE_URL     → nginx.conf proxy_pass for /api/*
#   DOCUMENT_SERVICE_URL → nginx.conf proxy_pass for /api/documents/*
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app: frontend
    {{- include "frontend.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/change-cause: "Helm release {{ .Release.Revision }}"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: frontend
      # ── OTEL auto-instrumentation: disable all agents ─────────────────────────────
      # The frontend container is nginx serving static files — there is no
      # Node.js runtime process to instrument. Disable all 4 OTEL language
      # agents to prevent 4 unnecessary init containers from being injected.
      annotations:
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "false"
    spec:
      serviceAccountName: frontend
      terminationGracePeriodSeconds: 30

      # ── Spread pods across availability zones ─────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: frontend

      # ── Pod-level security context ─────────────────────────────────────────
      securityContext:
        fsGroup: 101    # nginx group ID

      containers:
        - name: frontend
          image: {{ .Values.image.registry }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP

          env:
            # Injected by entrypoint.sh via envsubst into nginx.conf template
            - name: CORE_SERVICE_URL
              value: "http://core-service:{{ .Values.coreServicePort }}"
            - name: DOCUMENT_SERVICE_URL
              value: "http://document-service:{{ .Values.documentServicePort }}"

          # ── Resource management ───────────────────────────────────────────
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # ── Container-level security context ──────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101       # nginx user
            runAsGroup: 101      # nginx group
            readOnlyRootFilesystem: false  # nginx writes to /tmp and /var/cache/nginx
