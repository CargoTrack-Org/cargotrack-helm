# Frontend — Prod Environment Overrides
global:
  environment: prod
  namespace: cargotrack-prod
image:
  registry: "692828329130.dkr.ecr.us-east-1.amazonaws.com"
  tag: "8df37e5c8805eed7054ca7d4b9284ae0e5593f03" # CI/CD overwrites on every push
  pullPolicy: Always
replicas: 3
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  cpuTargetPercent: 70
