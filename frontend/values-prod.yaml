# Frontend — Prod Environment Overrides
global:
  environment: prod
  namespace: cargotrack-prod

image:
  registry: "692828329130.dkr.ecr.us-east-1.amazonaws.com"
  tag: "ab06005d12b3b76c57e0700b4c3500342dee0aa3"  # CI/CD overwrites on every push
  pullPolicy: Always

replicas: 3

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  cpuTargetPercent: 70
